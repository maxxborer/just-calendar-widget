name: Bug report
description: Report a reproducible problem in the app or a widget.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to improve Just Calendar Widget.
  - type: input
    id: version
    attributes:
      label: App version
      description: Include the release tag or commit hash.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Two Months widget
        - Four Months widget
        - Current Month widget
        - Setup guide
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behaviour
    validations:
      required: true
